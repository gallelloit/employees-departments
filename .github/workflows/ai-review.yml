name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get diff
        id: diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: AI Review
        run: |
          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior backend engineer reviewing a pull request. Focus on bugs, design issues, and improvements."
                },
                {
                  "role": "user",
                  "content": "'"$(cat diff.txt | sed 's/"/\\"/g')"'"
                }
              ]
            }' > review.json

      - name: Print review
        run: cat review.json